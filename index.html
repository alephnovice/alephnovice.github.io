<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>L-Corp Work Counter</title>
<style>
body{
    background:#0e0e11;
    color:#e6e6e6;
    font-family:Segoe UI, sans-serif;
    margin:0;
    padding:20px;
}
.container{
    max-width:1050px;
    margin:auto;
    background:#1a1a22;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 30px rgba(255,0,0,0.25);
}
h1{
    text-align:center;
    color:#ff3c3c;
    margin-bottom:25px;
}
.stat-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}
.stat-box{
    background:#2a2a33;
    padding:12px;
    border-radius:8px;
}
.success{
    background:#134d2f !important;
}
input[type="number"], select{
    width:100%;
    padding:6px;
    margin-top:6px;
    background:#111;
    color:white;
    border:1px solid #444;
    border-radius:6px;
}
.control-panel{
    margin-top:25px;
    background:#222;
    padding:15px;
    border-radius:8px;
}
.tier-buttons{
    display:flex;
    gap:8px;
}
.tier-buttons button{
    flex:1;
    padding:8px;
    background:#2a2a33;
    color:white;
    border:1px solid #444;
    border-radius:6px;
    cursor:pointer;
}
.tier-buttons button.active{
    background:#ff3c3c;
    border-color:#ff3c3c;
}
.row{
    display:flex;
    gap:15px;
    margin-top:12px;
}
.row div{
    flex:1;
}
table{
    width:100%;
    margin-top:25px;
    border-collapse:collapse;
}
th, td{
    padding:10px;
    text-align:center;
    border:1px solid #333;
}
th{
    background:#2a2a33;
}
.level-display{
    font-size:13px;
    color:#aaa;
    margin-top:5px;
}
.warning{
    color:#ff4c4c;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
<h1>L-Corp Work Counter</h1>

<div class="stat-grid">
<div class="stat-box" id="fortBox">
<b>Fortitude</b>
<input type="number" id="fortCurrent" value="20">
<d>to</d>
<input type="number" id="fortGoal" value="0">
<div id="fortLevel" class="level-display"></div>
</div>

<div class="stat-box" id="prudBox">
<b>Prudence</b>
<input type="number" id="prudCurrent" value="20">
<d>to</d>
<input type="number" id="prudGoal" value="0">
<div id="prudLevel" class="level-display"></div>
</div>

<div class="stat-box" id="tempBox">
<b>Temperance</b>
<input type="number" id="tempCurrent" value="20">
<d>to</d>
<input type="number" id="tempGoal" value="0">
<div id="tempLevel" class="level-display"></div>
</div>

<div class="stat-box" id="justBox">
<b>Justice</b>
<input type="number" id="justCurrent" value="20">
<d>to</d>
<input type="number" id="justGoal" value="0">
<div id="justLevel" class="level-display"></div>
</div>
</div>

<div class="control-panel">

<div class="tier-buttons">
<button data-tier="ZAYIN">ZAYIN</button>
<button data-tier="TETH">TETH</button>
<button data-tier="HE">HE</button>
<button data-tier="WAW">WAW</button>
<button data-tier="ALEPH" class="active">ALEPH</button>
</div>

<div class="row">
<div>
<label>Success Rate</label>
<select id="successRate">
<option value="0.3">Very Low</option>
<option value="0.45">Low</option>
<option value="0.65" selected>Common</option>
<option value="0.85">High</option>
<option value="1.0">Very High</option>
</select>
</div>

<div>
<label>Custom Max PE-Box</label>
<input type="number" id="customMaxPE" value="0">
</div>
</div>

<div class="row">
<div>
<label><input type="checkbox" id="researchBonus"> Research Bonus (1.5x)</label>
</div>
<div>
<label><input type="checkbox" id="riskMode"> Risk Mode (1.3x)</label>
</div>
<div>
<label><input type="checkbox" id="showWorst"> Show Worst Case</label>
</div>
</div>

</div>

<table>
<thead>
<tr>
<th>Work</th>
<th>Stat</th>
<th>Sessions Needed (Expected / MC Avg)</th>
<th>Worst</th>
<th>Risk</th>
</tr>
</thead>
<tbody id="resultTable"></tbody>
</table>

</div>

<script>

const tierDefault={ZAYIN:12,TETH:16,HE:20,WAW:24,ALEPH:33};

const levelModifier={
1:{ZAYIN:1.0,TETH:1.0,HE:1.2,WAW:1.4,ALEPH:1.0},
2:{ZAYIN:0.8,TETH:1.0,HE:1.0,WAW:1.2,ALEPH:1.4},
3:{ZAYIN:0.6,TETH:0.8,HE:1.0,WAW:1.0,ALEPH:1.2},
4:{ZAYIN:0.4,TETH:0.6,HE:0.8,WAW:1.0,ALEPH:1.0},
5:{ZAYIN:0.2,TETH:0.4,HE:0.6,WAW:0.8,ALEPH:1.0}
};

function getLevel(stat){
if(stat<30)return 1;
if(stat<45)return 2;
if(stat<65)return 3;
if(stat<85)return 4;
return 5;
}

function roman(l){return["I","II","III","IV","V"][l-1];}

function expNeeded(c,g){
let t=0;
for(let i=c;i<g;i++) t+=1+(i*0.1);
return t;
}

function expectedPE(maxPE, success){
let good = success;
let normal = (1-success)*0.7;
let bad = (1-success)*0.3;

return (good*maxPE) +
(normal*(maxPE*0.6)) +
(bad*(maxPE*0.3));
}

function monteCarloSessionsDetailed(neededExp, maxPE, success, levelMod, research, risk, isJustice){

let runs=10000;
let total=0;
let worst=0;

for(let r=0;r<runs;r++){

let gained=0;
let sessions=0;

while(gained<neededExp && sessions<500){

sessions++;
let roll=Math.random();
let pe=0;

if(roll<success){
pe=maxPE;
}else if(roll<success+(1-success)*0.7){
pe=maxPE*0.6;
}else{
pe=maxPE*0.3;
}

pe*=levelMod*research;
if(isJustice) pe*=0.5;
else pe*=risk;

gained+=pe;
}

total+=sessions;
if(sessions>worst) worst=sessions;
}

return {
avg:Math.ceil(total/runs),
worst:worst
};
}

let selectedTier="ALEPH";

document.querySelectorAll(".tier-buttons button").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".tier-buttons button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
selectedTier=btn.dataset.tier;
customMaxPE.value=tierDefault[selectedTier];
calculate();
};
});

document.querySelectorAll("input, select").forEach(el=>{
el.addEventListener("input",calculate);
});

function calculate(){

let success=parseFloat(successRate.value);
let research=researchBonus.checked?1.5:1;
let risk=riskMode.checked?1.3:1;
let maxPE=parseFloat(customMaxPE.value)||0;
let showWorst=document.getElementById("showWorst").checked;

let stats=[
{name:"Instinct",stat:"Fortitude",cur:fortCurrent.value,goal:fortGoal.value,box:"fortBox"},
{name:"Insight",stat:"Prudence",cur:prudCurrent.value,goal:prudGoal.value,box:"prudBox"},
{name:"Attachment",stat:"Temperance",cur:tempCurrent.value,goal:tempGoal.value,box:"tempBox"},
{name:"Repression",stat:"Justice",cur:justCurrent.value,goal:justGoal.value,box:"justBox"}
];

let table="";

stats.forEach(s=>{

let c=parseInt(s.cur)||0;
let g=parseInt(s.goal)||0;

let level=getLevel(c);
let levelMod=levelModifier[level][selectedTier];
let needed=g>c?expNeeded(c,g):0;

let expected=expectedPE(maxPE,success);
let expPerWork=expected*levelMod*research;
if(s.name==="Repression") expPerWork*=0.5;
else expPerWork*=risk;

let worksNeeded=needed>0?Math.ceil(needed/expPerWork):0;

let mc=needed>0
?monteCarloSessionsDetailed(needed,maxPE,success,levelMod,research,risk,s.name==="Repression")
:{avg:0,worst:0};

let works=worksNeeded===0?"✓":worksNeeded+" / MC≈"+mc.avg;
let worstDisplay=(showWorst && worksNeeded!==0)?mc.worst:"-";

document.getElementById(s.box).classList.toggle("success",g<=c);

let danger=(level===1 && selectedTier==="ALEPH")
?'<span class="warning">DANGER</span>':"Safe";

table+=`<tr>
<td>${s.name}</td>
<td>${s.stat}</td>
<td>${works}</td>
<td>${worstDisplay}</td>
<td>${danger}</td>
</tr>`;

document.getElementById(
s.stat.toLowerCase().slice(0,4)+"Level"
).innerText="Level "+roman(level);

});

resultTable.innerHTML=table;
}

calculate();

</script>
</body>

</html>
